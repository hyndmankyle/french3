<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Français 3 — Entraînement STAMP</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Français 3">
<meta name="theme-color" content="#2E5E8C">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232E5E8C'/%3E%3Ctext x='50' y='68' font-size='54' text-anchor='middle' fill='white' font-family='Georgia,serif' font-style='italic'%3EFr%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232E5E8C'/%3E%3Ctext x='50' y='68' font-size='54' text-anchor='middle' fill='white' font-family='Georgia,serif' font-style='italic'%3EFr%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1F4; --surface:#FFFFFF; --surface-2:#F6F8FA;
    --ink:#1E2A3A; --muted:#5C6B7A; --line:#DCE3EA;
    --brand:#2E5E8C; --brand-soft:#E5EEF5;
    --accent:#C04A6E; --accent-soft:#F7E3EA;
    --good:#2F8F63; --good-soft:#E3F3EB;
    --warn:#B07A1E; --warn-soft:#F8EFDC;
    --bad:#C0455C; --bad-soft:#F8E5E9;
    --r:16px; --r-sm:10px;
    --shadow:0 1px 2px rgba(30,42,58,.06),0 8px 24px rgba(30,42,58,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:16px; line-height:1.5; -webkit-text-size-adjust:100%;
    padding-bottom:calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 16px}
  h1,h2,h3{font-family:Fraunces,Georgia,serif;font-weight:600;line-height:1.15;margin:0}

  /* Header */
  header{
    position:sticky;top:0;z-index:50;background:rgba(238,241,244,.92);
    backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top);
  }
  .head-row{display:flex;align-items:center;gap:12px;padding:12px 0 10px}
  .mark{font-family:Fraunces,serif;font-style:italic;font-weight:600;font-size:22px;color:var(--brand);white-space:nowrap}
  .mark small{font-style:normal;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;line-height:1;margin-top:2px}
  .prog{flex:1;min-width:0}
  .prog-bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--accent));border-radius:99px;transition:width .5s ease}
  .prog-label{font-size:11px;color:var(--muted);margin-top:4px;display:flex;justify-content:space-between}

  /* Tabs */
  nav{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  nav::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto;border:1px solid var(--line);background:var(--surface);
    color:var(--muted);font-weight:600;font-size:14px;padding:9px 14px;border-radius:99px;
    cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:all .18s
  }
  .tab .dot{width:7px;height:7px;border-radius:99px;background:var(--line);transition:background .3s}
  .tab[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab.done .dot{background:var(--good)}
  .tab[aria-selected="true"] .dot{background:#fff}

  /* Sections */
  main{padding-top:18px}
  section[role=tabpanel]{display:none;animation:fade .35s ease}
  section[role=tabpanel].active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .lede h2{font-size:26px;margin-bottom:6px}
  .lede .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
  .lede p{color:var(--muted);margin:0 0 10px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin:14px 0;box-shadow:var(--shadow)}
  .card > h3{font-size:18px;margin-bottom:4px}
  .card .help{font-size:13.5px;color:var(--muted);margin:6px 0 14px;padding:9px 12px;background:var(--surface-2);border-left:3px solid var(--brand);border-radius:0 var(--r-sm) var(--r-sm) 0}

  .q{padding:13px 0;border-top:1px solid var(--line)}
  .q:first-of-type{border-top:0}
  .q-text{font-size:15.5px;line-height:1.9}
  .q-text .num{color:var(--accent);font-weight:700;font-family:Fraunces,serif;margin-right:6px}
  input.blank{
    font:inherit;font-size:15px;border:none;border-bottom:2px solid var(--brand);
    background:var(--brand-soft);border-radius:6px 6px 0 0;padding:3px 8px;margin:0 2px;
    min-width:78px;max-width:100%;color:var(--ink);transition:all .2s
  }
  input.blank:focus{outline:none;background:#fff;border-bottom-color:var(--accent)}
  input.blank.full{display:block;width:100%;margin-top:8px;min-width:0}
  input.ok{background:var(--good-soft);border-bottom-color:var(--good)}
  input.no{background:var(--bad-soft);border-bottom-color:var(--bad)}
  input.near{background:var(--warn-soft);border-bottom-color:var(--warn)}

  .q-actions{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
  .fb{font-size:14px;font-weight:600;min-height:20px}
  .fb.ok{color:var(--good)} .fb.no{color:var(--bad)} .fb.near{color:var(--warn)}
  .reveal{font-size:13.5px;color:var(--muted);margin-top:6px}
  .reveal b{color:var(--ink)}

  button{font-family:inherit}
  .btn{border:none;border-radius:99px;font-weight:600;font-size:14px;padding:9px 16px;cursor:pointer;transition:transform .08s,filter .15s}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}
  .btn-sm{padding:6px 12px;font-size:13px}

  .section-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:6px;flex-wrap:wrap}
  .score{font-weight:700;font-family:Fraunces,serif;color:var(--brand)}

  /* vocab */
  details.vocab{border:1px solid var(--line);border-radius:var(--r-sm);margin:10px 0;overflow:hidden;background:var(--surface)}
  details.vocab>summary{cursor:pointer;list-style:none;padding:13px 14px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
  details.vocab>summary::-webkit-details-marker{display:none}
  details.vocab>summary::after{content:"+";font-size:20px;color:var(--brand);font-weight:400}
  details.vocab[open]>summary::after{content:"–"}
  table{width:100%;border-collapse:collapse;font-size:14px}
  td{padding:9px 14px;border-top:1px solid var(--line);vertical-align:top}
  td.fr{font-weight:600;width:38%}
  td.en{color:var(--muted);width:30%}
  td.ex{color:var(--ink);font-size:13px}

  /* reading */
  .passage{background:var(--surface-2);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:14px 16px;margin:12px 0;font-size:15.5px;line-height:1.7}
  .passage h4{font-family:Fraunces,serif;margin:0 0 8px;font-size:17px}
  .done-row{display:flex;align-items:center;gap:9px;margin-top:8px;font-size:14px;color:var(--muted)}
  .done-row input{width:18px;height:18px;accent-color:var(--good)}

  /* writing */
  textarea{width:100%;font:inherit;font-size:15px;border:1px solid var(--line);border-radius:var(--r-sm);padding:11px;background:var(--surface-2);resize:vertical;min-height:120px;color:var(--ink)}
  textarea:focus{outline:none;border-color:var(--brand);background:#fff}
  .wc{font-size:12.5px;color:var(--muted);margin-top:6px}
  .model{margin-top:10px;background:var(--good-soft);border:1px solid #Bfe3cf;border-radius:var(--r-sm);padding:12px;font-size:14.5px;line-height:1.65;display:none}
  .model.show{display:block}
  .model .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--good);font-weight:700;margin-bottom:6px}
  .checklist{margin:8px 0 0;padding-left:18px;font-size:13.5px;color:var(--muted)}
  .checklist li{margin:3px 0}

  /* listening + speaking */
  .res{display:block;border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;margin:10px 0;background:var(--surface);text-decoration:none;color:inherit;transition:border-color .15s,transform .08s}
  .res:active{transform:scale(.99)}
  .res:hover{border-color:var(--brand)}
  .res .t{font-weight:700;color:var(--brand)}
  .res .lvl{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em}
  .res .d{font-size:13.5px;color:var(--muted);margin-top:3px}
  .res .go{float:right;color:var(--muted)}
  .field{margin:10px 0}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
  .field input,.field select{width:100%;font:inherit;font-size:15px;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px;background:var(--surface-2)}
  .field input:focus{outline:none;border-color:var(--brand);background:#fff}
  .logs{margin-top:12px}
  .log-item{font-size:13.5px;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;margin:8px 0;background:var(--surface-2);position:relative}
  .log-item b{color:var(--brand)}
  .log-item .del{position:absolute;top:8px;right:10px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:18px;line-height:1}
  .rec-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px}
  .rec-dot{width:10px;height:10px;border-radius:99px;background:var(--bad);display:inline-block}
  audio{width:100%;margin-top:8px}
  .stars{font-size:24px;letter-spacing:4px;cursor:pointer;user-select:none;color:var(--line)}
  .stars span.on{color:var(--warn)}

  .note{font-size:12.5px;color:var(--muted);margin-top:14px;text-align:center;padding:0 6px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:all .3s;z-index:100}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .reset{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="head-row">
      <div class="mark">Français&nbsp;3<small>Entraînement STAMP</small></div>
      <div class="prog">
        <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
        <div class="prog-label"><span id="progText">0 / 6 sections</span><span id="progPct">0%</span></div>
      </div>
    </div>
    <nav id="tabs" role="tablist"></nav>
  </div>
</header>

<main class="wrap" id="main"></main>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const norm = s => (s||"").toString().trim().toLowerCase()
  .replace(/[’´`]/g,"'").replace(/\s+/g," ").replace(/[.,;:!?]/g,"").trim();
const deAccent = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const looseNorm = s => deAccent(norm(s)).replace(/'/g," ").replace(/\s+/g," ").trim();

const GRAMMAR = [
  { id:"g1a", title:"1 · Passé composé vs. imparfait",
    help:"Imparfait = description, habitude, action en cours. Passé composé = action terminée et précise.",
    items:[
      {t:"Quand j'§ (être) petit(e), je § (jouer) au foot tous les jours.", a:[["étais"],["jouais"]]},
      {t:"Hier soir, nous § (aller) au cinéma avec des amis.", a:[["sommes allés","sommes allées","sommes allé","sommes allée"]]},
      {t:"Il § (faire) très beau quand elle § (sortir) de la maison.", a:[["faisait"],["est sortie","est sorti"]]},
      {t:"Pendant que je § (lire), le téléphone § (sonner).", a:[["lisais"],["a sonné"]]},
      {t:"Tous les étés, ma famille § (voyager), mais l'an dernier nous § (rester) chez nous.", a:[["voyageait"],["sommes restés","sommes restées","sommes resté"]]}
    ]},
  { id:"g1b", title:"2 · Le futur simple",
    help:"Attention aux radicaux irréguliers : aller→ir-, avoir→aur-, être→ser-, faire→fer-, venir→viendr-, pouvoir→pourr-.",
    items:[
      {t:"je § (parler)", a:[["parlerai"]]},
      {t:"tu § (finir)", a:[["finiras"]]},
      {t:"il § (aller)", a:[["ira"]]},
      {t:"nous § (avoir)", a:[["aurons"]]},
      {t:"vous § (faire)", a:[["ferez"]]},
      {t:"elles § (être)", a:[["seront"]]},
      {t:"on § (venir)", a:[["viendra"]]},
      {t:"je § (pouvoir)", a:[["pourrai"]]}
    ]},
  { id:"g1c", title:"3 · Le conditionnel et les phrases avec « si »",
    help:"Politesse et hypothèses. Rappel : Si + imparfait → conditionnel.",
    items:[
      {t:"Je § (vouloir) un café, s'il vous plaît.", a:[["voudrais"]]},
      {t:"Tu § (devoir) étudier un peu plus.", a:[["devrais"]]},
      {t:"Nous § (aimer) visiter le Sénégal un jour.", a:[["aimerions"]]},
      {t:"Si j'avais le temps, je § (voyager) partout.", a:[["voyagerais"]]},
      {t:"Si tu étudiais davantage, tu § (réussir) à l'examen.", a:[["réussirais"]]},
      {t:"S'il faisait beau demain, nous § (aller) à la plage.", a:[["irions"]]}
    ]},
  { id:"g1d", title:"4 · Le subjonctif présent",
    help:"Après il faut que, je veux que, bien que, il est important que, souhaiter que…",
    items:[
      {t:"Il faut que tu § (être) à l'heure.", a:[["sois"]]},
      {t:"Je veux que vous § (faire) attention.", a:[["fassiez"]]},
      {t:"Bien qu'il § (avoir) raison, il est trop direct.", a:[["ait"]]},
      {t:"Il est important que nous § (finir) ce projet.", a:[["finissions"]]},
      {t:"Mes parents souhaitent que je § (aller) à l'université.", a:[["aille"]]}
    ]},
  { id:"g1e", title:"5 · Les pronoms (COD, COI, y, en)",
    help:"Réécris la phrase en remplaçant les mots indiqués par le bon pronom. Écris la phrase entière.",
    loose:true,
    items:[
      {t:"Je vois Marie au parc.  → §full", a:[["je la vois au parc","je la vois"]]},
      {t:"Il parle à ses parents tous les soirs.  → §full", a:[["il leur parle tous les soirs","il leur parle"]]},
      {t:"Nous allons à Paris en train.  → §full", a:[["nous y allons en train","nous y allons"]]},
      {t:"Tu as des pommes ?  → (Oui,) §full", a:[["oui j'en ai","j'en ai","oui jen ai","jen ai"]]},
      {t:"Elle donne le livre à Paul.  → §full", a:[["elle le lui donne"]]}
    ]},
  { id:"g1f", title:"6 · Les pronoms relatifs (qui, que, dont, où)",
    help:"qui = sujet · que = objet · dont = de (de qui/duquel) · où = lieu/temps.",
    items:[
      {t:"C'est le livre § j'ai acheté hier.", a:[["que","qu'"]]},
      {t:"Voilà la femme § habite à côté de chez moi.", a:[["qui"]]},
      {t:"Le film § je parle vient de sortir.", a:[["dont"]]},
      {t:"C'est la ville § je suis né(e).", a:[["où"]]},
      {t:"J'ai un ami § le frère est acteur.", a:[["dont"]]}
    ]},
  { id:"g1g", title:"7 · Comparatif et superlatif",
    help:"(+) plus · (=) aussi · (−) moins … que. Irréguliers : bon→meilleur, bien→mieux.",
    items:[
      {t:"Marie est § grande § Paul. (+)", a:[["plus"],["que"]]},
      {t:"Ce livre est § intéressant § l'autre. (=)", a:[["aussi"],["que"]]},
      {t:"Le train est § rapide § la voiture. (−)", a:[["moins"],["que"]]},
      {t:"C'est le restaurant § de la ville. (le plus cher)", a:[["le plus cher"]]},
      {t:"Elle parle français § que moi. (bien → ?)", a:[["mieux"]]}
    ]}
];

const VOCAB_TABLES = [
  { title:"Les voyages et les transports", rows:[
    ["un billet (aller-retour)","a (round-trip) ticket","Je voudrais un billet aller-retour."],
    ["la gare / l'aéroport","train station / airport","Le train part de la gare à 9 h."],
    ["à l'étranger","abroad","Cet été, je vais voyager à l'étranger."],
    ["faire ses valises","to pack one's bags","Je dois faire mes valises ce soir."],
    ["l'horaire (m.)","the schedule","Vérifie l'horaire des trains."]
  ]},
  { title:"L'environnement et la société", rows:[
    ["le réchauffement climatique","global warming","Le réchauffement climatique nous inquiète."],
    ["recycler / le recyclage","to recycle / recycling","Il faut recycler le plastique."],
    ["la pollution","pollution","La pollution de l'air augmente."],
    ["protéger la planète","to protect the planet","Nous devons protéger la planète."],
    ["le développement durable","sustainable development","On parle de développement durable."]
  ]},
  { title:"La technologie, les médias et l'avenir", rows:[
    ["les réseaux sociaux","social media","Je passe trop de temps sur les réseaux sociaux."],
    ["un ordinateur portable","a laptop","Mon ordinateur portable est en panne."],
    ["télécharger","to download","Je vais télécharger l'application."],
    ["chercher un emploi","to look for a job","Après le lycée, elle cherchera un emploi."],
    ["avoir l'intention de","to intend to","J'ai l'intention d'étudier la médecine."]
  ]}
];

const VOCAB_QUIZ = { id:"v2d", title:"Complète avec un mot logique",
  help:"Utilise le vocabulaire des listes ci-dessus.",
  items:[
    {t:"Avant de partir en voyage, je dois § mes valises.", a:[["faire"]]},
    {t:"Pour § la planète, il faut réduire la §.", a:[["protéger"],["pollution"]]},
    {t:"Mon frère passe des heures sur les § chaque jour.", a:[["réseaux sociaux"]]},
    {t:"Nous prendrons le train ; rendez-vous à la § à 8 h.", a:[["gare"]]},
    {t:"Après le lycée, elle a § d'étudier l'ingénierie.", a:[["l'intention","intention"]]}
  ]};

const READING = {
  title:"Le projet de Léa",
  text:["Léa a dix-sept ans et elle habite à Lyon avec ses parents et son petit frère. L'année prochaine, elle terminera le lycée et elle voudrait étudier les sciences de l'environnement à l'université. « Depuis que je suis petite, la nature me passionne », explique-t-elle. « Quand j'étais enfant, je passais tous mes étés à la campagne chez mes grands-parents, et j'ai appris à respecter la planète. »",
    "Cet été, Léa a participé à un projet de recyclage dans son quartier. Avec d'autres jeunes, elle a organisé des ateliers pour expliquer aux habitants comment réduire leurs déchets. « Si chaque personne faisait un petit effort, nous pourrions changer beaucoup de choses », dit-elle. Après l'université, Léa a l'intention de travailler pour une organisation qui protège l'environnement, peut-être à l'étranger."],
  questions:[
    {q:"Où habite Léa et avec qui ?", m:"Léa habite à Lyon avec ses parents et son petit frère."},
    {q:"Qu'est-ce qu'elle voudrait étudier à l'université ? Pourquoi ?", m:"Elle voudrait étudier les sciences de l'environnement parce que la nature la passionne depuis l'enfance."},
    {q:"Qu'est-ce qu'elle a fait cet été ? Décris le projet.", m:"Elle a participé à un projet de recyclage et a organisé des ateliers pour aider les habitants à réduire leurs déchets."},
    {q:"Quelles sont ses intentions après l'université ?", m:"Elle a l'intention de travailler pour une organisation qui protège l'environnement, peut-être à l'étranger."},
    {q:"Trouve un verbe au passé composé, un à l'imparfait et un au futur.", m:"Passé composé : a participé / a organisé · Imparfait : étais / passais · Futur : terminera."}
  ]};

const WRITING = [
  { id:"w1", title:"Te présenter", tense:"présent",
    prompt:"Présente-toi : ton nom, ton âge, ta famille, où tu habites et ce que tu aimes faire. Utilise le présent et des connecteurs (et, mais, parce que, aussi).",
    check:["Présent correct","Au moins 6 phrases","Connecteurs utilisés"],
    model:"Bonjour ! Je m'appelle Emma et j'ai dix-sept ans. J'habite à Plano, au Texas, avec mes parents et mon frère. J'aime beaucoup la musique et le sport, mais ma passion, c'est le français. Le week-end, je joue au tennis avec mes amis parce que c'est amusant. J'étudie aussi le piano depuis cinq ans." },

/* ============================================================
   ANSWER CHECKING
   ============================================================ */
function judge(val, accepted, loose){
  const n = norm(val);
  if(!n) return "empty";
  for(const a of accepted){ if(n === norm(a)) return "ok"; }
  if(loose){ const ln = looseNorm(val); for(const a of accepted){ if(ln === looseNorm(a)) return "ok"; } }
  for(const a of accepted){ if(deAccent(n) === deAccent(norm(a))) return "near"; }
  if(loose){ const ln=looseNorm(val); for(const a of accepted){ if(ln.includes(looseNorm(a))||looseNorm(a).includes(ln)) return "near"; } }
  return "no";
}

/* ============================================================
   RENDER: quiz blocks (grammar + vocab)
   ============================================================ */
function renderQuiz(group){
  const card = el("div","card");
  card.append(el("h3",null,group.title));
  if(group.help) card.append(el("div","help",group.help));

  group.items.forEach((item,i)=>{
    const itemId = group.id+"_"+i;
    const q = el("div","q");
    const line = el("div","q-text");
    line.append(el("span","num",(i+1)+"."));
    const parts = item.t.split("§");
    parts.forEach((part,idx)=>{
      // handle "full" marker right after §
      let txt = part, isFull=false;
      if(txt.startsWith("full")){ isFull=true; txt=txt.slice(4); }
      line.append(document.createTextNode(txt));
      if(idx < parts.length-1){
        const nextFull = parts[idx+1].startsWith("full");
        const inp = el("input","blank"+(nextFull?" full":""));
        inp.type="text"; inp.autocapitalize="none"; inp.autocomplete="off"; inp.spellcheck=false;
        inp.dataset.b = idx;
        line.append(inp);
      }
    });
    q.append(line);

    const actions = el("div","q-actions");
    const checkBtn = el("button","btn btn-primary btn-sm","Vérifier");
    const fb = el("div","fb");
    const revBtn = el("button","btn btn-ghost btn-sm","Réponse");
    const reveal = el("div","reveal"); reveal.style.display="none";
    reveal.innerHTML = "<b>Réponse :</b> " + item.a.map(opts=>opts[0]).join("  /  ");
    actions.append(checkBtn, revBtn, fb);
    q.append(actions, reveal);

    const inputs = ()=> Array.from(line.querySelectorAll("input.blank"));

    function check(){
      let allOk=true, anyNear=false, filled=true;
      inputs().forEach((inp,bi)=>{
        const r = judge(inp.value, item.a[bi], group.loose);
        inp.classList.remove("ok","no","near");
        if(r==="ok") inp.classList.add("ok");
        else if(r==="near"){ inp.classList.add("near"); anyNear=true; allOk=false; }
        else if(r==="empty"){ filled=false; allOk=false; }
        else { inp.classList.add("no"); allOk=false; }
      });
      fb.className="fb "+(allOk?"ok":anyNear?"near":"no");
      if(allOk){ fb.textContent="✓ Correct !"; STATE.correct[itemId]=true; }
      else if(!filled){ fb.className="fb"; fb.textContent="Complète le(s) blanc(s)."; }
      else if(anyNear){ fb.textContent="Presque — vérifie les accents / l'orthographe."; }
      else { fb.textContent="Pas tout à fait. Réessaie."; delete STATE.correct[itemId]; }
      save(); updateProgress();
    }
    checkBtn.onclick = check;
    revBtn.onclick = ()=>{ reveal.style.display = reveal.style.display==="none"?"block":"none"; };
    inputs().forEach(inp=> inp.addEventListener("keydown",e=>{ if(e.key==="Enter") check(); }));
    if(STATE.correct[itemId]) inputs().forEach(i=>i.classList.add("ok"));

    card.append(q);
  });

  const foot = el("div","section-foot");
  const score = el("div","score");
  const allBtn = el("button","btn btn-accent btn-sm","Tout vérifier");
  allBtn.onclick = ()=>{ card.querySelectorAll(".q .btn-primary").forEach(b=>b.click()); };
  const updateScore = ()=>{
    const total = group.items.length;
    let got=0; group.items.forEach((_,i)=>{ if(STATE.correct[group.id+"_"+i]) got++; });
    score.textContent = got+" / "+total;
  };
  group._updateScore = updateScore;
  foot.append(allBtn, score);
  card.append(foot);
  setTimeout(updateScore,0);
  return card;
}

function buildOral(){
  const s = el("section"); s.setAttribute("role","tabpanel"); s.dataset.id="oral";
  s.append(headLede("Expression orale","À voix haute","Enregistre-toi, réécoute-toi, recommence. Parle 45–90 secondes par sujet — sans tout lire."));
  SPEAKING.forEach(sp=>{
    const card = el("div","card");
    card.append(el("h3",null,sp.t));
    card.append(el("div","help","Vocabulaire utile : "+sp.v));
    const row = el("div","rec-row");
    const recBtn = el("button","btn btn-accent btn-sm","● Enregistrer");
    const audioWrap = el("div"); audioWrap.style.width="100%";
    row.append(recBtn);
    card.append(row, audioWrap);

    // self rating
    const stars = el("div","stars"); stars.dataset.id=sp.id;
    for(let i=1;i<=5;i++){ const st=el("span",null,"★"); st.dataset.v=i; stars.append(st); }
    const setStars=(v)=>{ Array.from(stars.children).forEach(c=> c.classList.toggle("on", +c.dataset.v<=v)); };
    setStars(STATE.stars[sp.id]||0);
    stars.onclick=(e)=>{ if(e.target.dataset.v){ STATE.stars[sp.id]=+e.target.dataset.v; save(); setStars(+e.target.dataset.v); } };
    const slabel = el("div","wc","Auto-évaluation (clarté + fluidité) :");
    card.append(slabel, stars);

    let rec=null, chunks=[], recording=false;
    recBtn.onclick = async ()=>{
      if(recording){ rec && rec.stop(); return; }
      if(!navigator.mediaDevices || !window.MediaRecorder){ toast("Enregistrement non disponible sur ce navigateur."); return; }
      try{
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        rec = new MediaRecorder(stream); chunks=[];
        rec.ondataavailable = e=> chunks.push(e.data);
        rec.onstop = ()=>{
          const blob = new Blob(chunks,{type:rec.mimeType||"audio/webm"});
          const url = URL.createObjectURL(blob);
          audioWrap.innerHTML=""; const au=el("audio"); au.controls=true; au.src=url; audioWrap.append(au);
          stream.getTracks().forEach(t=>t.stop());
          recBtn.innerHTML="● Réenregistrer"; recBtn.classList.remove("btn-primary"); recBtn.classList.add("btn-accent");
          recording=false;
        };
        rec.start(); recording=true;
        recBtn.innerHTML="■ Arrêter"; recBtn.classList.remove("btn-accent"); recBtn.classList.add("btn-primary");
      }catch(err){ toast("Micro refusé ou indisponible."); }
    };
    s.append(card);
  });
  const note = el("div","note","Astuce : les enregistrements restent sur cette page et disparaissent si tu la recharges — réécoute-toi tout de suite, puis recommence.");
  s.append(note);
  return s;
}

function td(txt,cls){ return el("td",cls,txt); }
function field(label,type,id,opts){
  const wrap=el("div","field"); const lab=el("label",null,label); lab.htmlFor=id;
  let input;
  if(type==="select"){ input=el("select"); (opts||[]).forEach(o=>{const op=el("option",null,o);op.value=o;input.append(op);}); }
  else { input=el("input"); input.type="text"; }
  input.id=id;
  wrap.append(lab,input); return {wrap,input};
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1900); }

/* ============================================================
   PROGRESS
   ============================================================ */
function sectionComplete(id){
  if(id==="grammaire"){ return GRAMMAR.every(g=> g.items.every((_,i)=> STATE.correct[g.id+"_"+i])); }
  if(id==="vocabulaire"){ return VOCAB_QUIZ.items.every((_,i)=> STATE.correct[VOCAB_QUIZ.id+"_"+i]); }
  if(id==="lecture"){ return READING.questions.every((_,i)=> STATE.done["read_"+i]); }
  if(id==="ecriture"){ return WRITING.every(w=> STATE.done[w.id]); }
  if(id==="ecoute"){ return STATE.logs.length>=3; }
  if(id==="oral"){ return SPEAKING.every(sp=> (STATE.stars[sp.id]||0)>0); }
  return false;
}
function updateProgress(){
  let done=0; const real=SECTIONS.filter(s=>s.id!=="accueil");
  real.forEach(s=>{
    const ok=sectionComplete(s.id);
    if(ok)done++;
    const tab=document.querySelector('.tab[data-id="'+s.id+'"]');
    if(tab) tab.classList.toggle("done",ok);
  });
  const pct=Math.round(done/real.length*100);
  document.getElementById("progFill").style.width=pct+"%";
  document.getElementById("progText").textContent=done+" / "+real.length+" sections";
  document.getElementById("progPct").textContent=pct+"%";
  GRAMMAR.forEach(g=> g._updateScore && g._updateScore());
  if(VOCAB_QUIZ._updateScore) VOCAB_QUIZ._updateScore();
}

/* ============================================================
   BUILD + NAV
   ============================================================ */
const builders={accueil:buildAccueil,grammaire:buildGrammaire,vocabulaire:buildVocabulaire,lecture:buildLecture,ecriture:buildEcriture,ecoute:buildEcoute,oral:buildOral};
const main=document.getElementById("main");
const tabsEl=document.getElementById("tabs");
const panels={};
SECTIONS.forEach((s,i)=>{
  const tab=el("button","tab"); tab.setAttribute("role","tab"); tab.dataset.id=s.id;
  tab.innerHTML='<span class="dot"></span>'+s.label;
  tab.onclick=()=>select(s.id);
  tabsEl.append(tab);
  const panel=builders[s.id](); panels[s.id]=panel; main.append(panel);
});
function select(id){
  SECTIONS.forEach(s=>{
    const on=s.id===id;
    panels[s.id].classList.toggle("active",on);
    const tab=document.querySelector('.tab[data-id="'+s.id+'"]');
    tab.setAttribute("aria-selected",on?"true":"false");
  });
  window.scrollTo({top:0,behavior:"smooth"});
  const tab=document.querySelector('.tab[data-id="'+id+'"]');
  tab && tab.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
}
select("accueil");
updateProgress();
</script>
